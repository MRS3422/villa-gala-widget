<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      /* Transparent aux clics partout SAUF sur le widget */
      pointer-events: none;
    }
    elevenlabs-convai {
      pointer-events: auto;
      position: fixed;
      bottom: 16px;
      right: 16px;
    }
  </style>
</head>
<body>

  <elevenlabs-convai
    agent-id="agent_4501kqssdf63e1qsqw3j0rx7b25f">
  </elevenlabs-convai>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    function init() {
      var widget = document.querySelector('elevenlabs-convai');
      if (!widget) { setTimeout(init, 300); return; }

      widget.addEventListener('elevenlabs-convai:call', function(event) {
        // Agrandir l'iframe quand l'appel démarre
        window.parent.postMessage({ type: 'WIDGET_OPEN' }, '*');

        event.detail.config.clientTools = {
          navigateToPage: function(params) {
            var url = params && params.url;
            if (!url) return { success: false };
            window.parent.postMessage({ type: 'DO_NAVIGATE', url: url }, '*');
            return { success: true };
          }
        };
      });

      widget.addEventListener('elevenlabs-convai:disconnect', function() {
        // Réduire l'iframe quand l'appel se termine
        window.parent.postMessage({ type: 'WIDGET_CLOSE' }, '*');
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }
  </script>

</body>
</html>
