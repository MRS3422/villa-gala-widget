<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none; /* clics passent à travers sauf éléments pointer-events:auto */
    }

    /* ── Orbe ─────────────────────────────────────── */
    #orb {
      pointer-events: auto;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 35% 35%, #6fa3ff, #1a4fff 55%, #0a2bd4);
      box-shadow: 0 4px 20px rgba(26, 79, 255, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 100;
    }
    #orb:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(26, 79, 255, 0.7);
    }
    #orb.pulse {
      animation: orbPulse 1.8s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(26,79,255,0.55); }
      50%       { box-shadow: 0 4px 20px rgba(26,79,255,0.55), 0 0 0 12px rgba(26,79,255,0.15); }
    }
    #orb svg { width: 26px; height: 26px; }

    /* ── Panel de conversation ────────────────────── */
    #panel {
      pointer-events: auto;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 280px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #panel.visible { display: flex; }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }
    #btn-close {
      pointer-events: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 18px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
    }
    #btn-close:hover { background: #f0f0f0; color: #333; }

    /* Visualiseur audio animé */
    #visualizer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 40px;
    }
    .bar {
      width: 4px;
      border-radius: 4px;
      background: #1a4fff;
      animation: none;
      height: 6px;
      transition: height 0.1s;
    }
    .speaking .bar:nth-child(1) { animation: bar 0.8s ease-in-out infinite; }
    .speaking .bar:nth-child(2) { animation: bar 0.8s ease-in-out 0.15s infinite; }
    .speaking .bar:nth-child(3) { animation: bar 0.8s ease-in-out 0.3s infinite; }
    .speaking .bar:nth-child(4) { animation: bar 0.8s ease-in-out 0.1s infinite; }
    .speaking .bar:nth-child(5) { animation: bar 0.8s ease-in-out 0.25s infinite; }
    .listening .bar:nth-child(1) { animation: bar 1.2s ease-in-out infinite; }
    .listening .bar:nth-child(2) { animation: bar 1.2s ease-in-out 0.2s infinite; }
    .listening .bar:nth-child(3) { animation: bar 1.2s ease-in-out 0.4s infinite; }
    .listening .bar:nth-child(4) { animation: bar 1.2s ease-in-out 0.15s infinite; }
    .listening .bar:nth-child(5) { animation: bar 1.2s ease-in-out 0.35s infinite; }
    @keyframes bar {
      0%, 100% { height: 6px; opacity: 0.4; }
      50%       { height: 28px; opacity: 1; }
    }

    #status-text {
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    #btn-end {
      pointer-events: auto;
      background: #ff3b30;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-end:hover { background: #c0392b; }

    #branding {
      text-align: center;
      font-size: 10px;
      color: #bbb;
    }

    /* Mobile */
    @media (max-width: 480px) {
      #panel { width: calc(100vw - 24px); right: 12px; bottom: 84px; }
      #orb   { bottom: 16px; right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Orbe -->
  <button id="orb" class="pulse" title="Parler au concierge">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 2C10.34 2 9 3.34 9 5V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V5C15 3.34 13.66 2 12 2Z" fill="white"/>
      <path d="M17 12C17 14.76 14.76 17 12 17C9.24 17 7 14.76 7 12H5C5 15.53 7.61 18.43 11 18.92V22H13V18.92C16.39 18.43 19 15.53 19 12H17Z" fill="white"/>
    </svg>
  </button>

  <!-- Panel conversation -->
  <div id="panel">
    <div id="panel-header">
      <span id="panel-title">Concierge Villa Gala</span>
      <button id="btn-close">✕</button>
    </div>

    <div id="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div id="status-text">Connexion en cours...</div>
    <button id="btn-end">Terminer la conversation</button>
    <div id="branding">Powered by H'COM × ElevenLabs</div>
  </div>

  <!-- SDK ElevenLabs via CDN (ES module) -->
  <script type="module">
    import { Conversation } from 'https://unpkg.com/@elevenlabs/client@latest/dist/index.mjs';

    const AGENT_ID = 'agent_4501kqssdf63e1qsqw3j0rx7b25f';

    const orb        = document.getElementById('orb');
    const panel      = document.getElementById('panel');
    const statusText = document.getElementById('status-text');
    const visualizer = document.getElementById('visualizer');
    const btnEnd     = document.getElementById('btn-end');
    const btnClose   = document.getElementById('btn-close');

    let conversation = null;

    // ── Démarrer la conversation ─────────────────────────────────────
    async function startConversation() {
      orb.classList.remove('pulse');
      orb.style.display = 'none';
      panel.classList.add('visible');
      statusText.textContent = 'Connexion en cours...';
      visualizer.className = '';

      // Agrandir l'iframe côté Framer
      window.parent.postMessage({ type: 'WIDGET_OPEN' }, '*');

      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch(e) {
        statusText.textContent = 'Microphone refusé. Veuillez autoriser l\'accès.';
        return;
      }

      try {
        conversation = await Conversation.startSession({
          agentId: AGENT_ID,

          clientTools: {
            navigateToPage: function(params) {
              var url = params && params.url;
              if (!url) return { success: false };
              window.parent.postMessage({ type: 'DO_NAVIGATE', url: url }, '*');
              return { success: true };
            }
          },

          onConnect: () => {
            statusText.textContent = 'À votre écoute...';
            visualizer.className = 'listening';
          },

          onDisconnect: () => {
            endConversation(false);
          },

          onModeChange: ({ mode }) => {
            if (mode === 'speaking') {
              statusText.textContent = 'Le concierge vous répond...';
              visualizer.className = 'speaking';
            } else {
              statusText.textContent = 'À votre écoute...';
              visualizer.className = 'listening';
            }
          },

          onError: (err) => {
            statusText.textContent = 'Erreur de connexion.';
            console.error(err);
          }
        });

      } catch(e) {
        statusText.textContent = 'Impossible de démarrer. Réessayez.';
        console.error(e);
      }
    }

    // ── Terminer la conversation ─────────────────────────────────────
    async function endConversation(manual = true) {
      if (conversation && manual) {
        await conversation.endSession();
        conversation = null;
      }
      panel.classList.remove('visible');
      orb.style.display = 'flex';
      orb.classList.add('pulse');
      visualizer.className = '';
      window.parent.postMessage({ type: 'WIDGET_CLOSE' }, '*');
    }

    // ── Events ───────────────────────────────────────────────────────
    orb.addEventListener('click', startConversation);
    btnEnd.addEventListener('click', () => endConversation(true));
    btnClose.addEventListener('click', () => endConversation(true));
  </script>

</body>
</html>
