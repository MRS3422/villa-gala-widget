<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; height: 100%; 
      background: transparent; 
      overflow: hidden;
    }
    elevenlabs-convai {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <elevenlabs-convai 
    agent-id="agent_4501kqssdf63e1qsqw3j0rx7b25f">
  </elevenlabs-convai>
  <script 
    src="https://unpkg.com/@elevenlabs/convai-widget-embed" 
    async 
    type="text/javascript">
  </script>

  <script>
    // Écoute les demandes de navigation venant du parent Framer
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'NAVIGATE') {
        window.parent.postMessage({ type: 'DO_NAVIGATE', url: e.data.url }, '*');
      }
    });

    // Enregistre le client tool de navigation
    function init() {
      var widget = document.querySelector('elevenlabs-convai');
      if (!widget) { setTimeout(init, 300); return; }

      widget.addEventListener('elevenlabs-convai:call', function(event) {
        event.detail.config.clientTools = {
          navigateToPage: function(params) {
            var url = params && params.url;
            if (!url) return { success: false };
            // Envoie l'ordre de navigation au parent (la page Framer)
            window.parent.postMessage({ type: 'DO_NAVIGATE', url: url }, '*');
            return { success: true };
          }
        };
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }
  </script>
</body>
</html>
