<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #orb {
      position: fixed;
      bottom: 15px;
      right: 15px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 35% 35%, #6fa3ff, #1a4fff 55%, #0a2bd4);
      box-shadow: 0 4px 20px rgba(26,79,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: pulse 2.5s ease-in-out infinite;
      transition: transform 0.2s;
    }
    #orb:hover { transform: scale(1.1); }
    #orb svg { width: 26px; height: 26px; pointer-events: none; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 20px rgba(26,79,255,0.55); }
      50%      { box-shadow: 0 4px 20px rgba(26,79,255,0.55), 0 0 0 10px rgba(26,79,255,0.15); }
    }

    #panel {
      position: fixed;
      bottom: 85px;
      right: 15px;
      width: 280px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      padding: 18px;
      display: none;
      flex-direction: column;
      gap: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #panel.open { display: flex; }

    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #panel-title { font-size: 14px; font-weight: 600; color: #111; }
    #btn-close {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #999; padding: 2px 6px;
      border-radius: 6px;
    }
    #btn-close:hover { background: #f0f0f0; }

    #viz {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 44px;
    }
    .bar {
      width: 4px;
      height: 8px;
      border-radius: 4px;
      background: #1a4fff;
    }
    #viz.listening .bar { animation: barAnim 1.2s ease-in-out infinite; }
    #viz.speaking  .bar { animation: barAnim 0.5s ease-in-out infinite; }
    #viz.listening .bar:nth-child(2) { animation-delay: 0.2s; }
    #viz.listening .bar:nth-child(3) { animation-delay: 0.4s; }
    #viz.listening .bar:nth-child(4) { animation-delay: 0.1s; }
    #viz.listening .bar:nth-child(5) { animation-delay: 0.3s; }
    #viz.speaking  .bar:nth-child(2) { animation-delay: 0.1s; }
    #viz.speaking  .bar:nth-child(3) { animation-delay: 0.2s; }
    #viz.speaking  .bar:nth-child(4) { animation-delay: 0.05s; }
    #viz.speaking  .bar:nth-child(5) { animation-delay: 0.15s; }
    @keyframes barAnim {
      0%,100% { height: 8px; opacity: 0.4; }
      50%      { height: 30px; opacity: 1; }
    }

    #status { text-align: center; font-size: 13px; color: #666; }

    #btn-end {
      background: #111; color: #fff; border: none;
      border-radius: 10px; padding: 11px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #btn-end:hover { background: #333; }

    #branding { text-align: center; font-size: 10px; color: #bbb; }

    #error { color: #e53e3e; font-size: 12px; text-align: center; }

    @media (max-width: 420px) {
      #panel { width: calc(100vw - 30px); right: 15px; }
    }
  </style>
</head>
<body>

  <button id="orb" title="Parler au concierge">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 2C10.34 2 9 3.34 9 5v7c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-1.66-1.34-3-3-3z" fill="white"/>
      <path d="M17 12c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V22h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" fill="white"/>
    </svg>
  </button>

  <div id="panel">
    <div id="panel-header">
      <span id="panel-title">Concierge Villa Gala</span>
      <button id="btn-close">✕</button>
    </div>
    <div id="viz">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div id="status">Connexion…</div>
    <div id="error"></div>
    <button id="btn-end">Terminer</button>
    <div id="branding">Powered by H'COM × ElevenLabs</div>
  </div>

  <script type="module">
    import { Conversation } from 'https://esm.sh/@elevenlabs/client';

    const AGENT_ID = 'agent_4501kqssdf63e1qsqw3j0rx7b25f';

    const orb    = document.getElementById('orb');
    const panel  = document.getElementById('panel');
    const status = document.getElementById('status');
    const viz    = document.getElementById('viz');
    const error  = document.getElementById('error');
    const btnEnd   = document.getElementById('btn-end');
    const btnClose = document.getElementById('btn-close');

    let conv = null;

    function setViz(mode) { viz.className = mode || ''; }
    function setStatus(t) { status.textContent = t; }
    function setError(t)  { error.textContent  = t || ''; }

    async function start() {
      setError('');
      orb.style.display = 'none';
      panel.classList.add('open');
      setStatus('Connexion…');
      setViz('');
      window.parent.postMessage({ type: 'WIDGET_OPEN' }, '*');

      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        setError('Microphone refusé. Veuillez autoriser.');
        return;
      }

      try {
        conv = await Conversation.startSession({
          agentId: AGENT_ID,
          connectionType: 'webrtc',

          clientTools: {
            navigateToPage: function(params) {
              const url = params && params.url;
              if (!url) return { success: false };
              window.parent.postMessage({ type: 'DO_NAVIGATE', url }, '*');
              return { success: true };
            }
          },

          onConnect: () => {
            setStatus('À votre écoute…');
            setViz('listening');
          },
          onModeChange: ({ mode }) => {
            if (mode === 'speaking') {
              setStatus('Le concierge vous répond…');
              setViz('speaking');
            } else {
              setStatus('À votre écoute…');
              setViz('listening');
            }
          },
          onDisconnect: () => stop(false),
          onError: (msg) => setError(String(msg))
        });

      } catch(e) {
        setError('Impossible de démarrer. Réessayez.');
        console.error(e);
      }
    }

    async function stop(manual = true) {
      if (conv && manual) {
        try { await conv.endSession(); } catch {}
      }
      conv = null;
      panel.classList.remove('open');
      orb.style.display = 'flex';
      setViz('');
      window.parent.postMessage({ type: 'WIDGET_CLOSE' }, '*');
    }

    orb.addEventListener('click', start);
    btnEnd.addEventListener('click', () => stop(true));
    btnClose.addEventListener('click', () => stop(true));
  </script>

</body>
</html>
