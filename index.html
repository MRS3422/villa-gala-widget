<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none; /* les clics passent à travers sauf sur le widget */
    }
    elevenlabs-convai {
      pointer-events: auto; /* seul le widget est cliquable */
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
    /* Sur mobile, colle au bord */
    @media (max-width: 480px) {
      elevenlabs-convai {
        bottom: 12px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <elevenlabs-convai 
    agent-id="agent_4501kqssdf63e1qsqw3j0rx7b25f">
  </elevenlabs-convai>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    function init() {
      var widget = document.querySelector('elevenlabs-convai');
      if (!widget) { setTimeout(init, 300); return; }

      widget.addEventListener('elevenlabs-convai:call', function(event) {
        event.detail.config.clientTools = {
          navigateToPage: function(params) {
            var url = params && params.url;
            if (!url) return { success: false };
            window.parent.postMessage({ type: 'DO_NAVIGATE', url: url }, '*');
            return { success: true };
          }
        };
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }
  </script>
</body>
</html>
