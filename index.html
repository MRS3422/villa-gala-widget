<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom ElevenLabs Voice Orb</title>
  <style>
    :root {
      --orb-base: #6366f1;
      --orb-listening: #06b6d4;
      --orb-speaking: #ec4899;
      --bg: #0b0f1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #1a1f3a 0%, var(--bg) 70%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      overflow: hidden;
    }
    .orb-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--orb-base), #1e1b4b 70%);
      box-shadow:
        0 0 60px 10px var(--orb-base),
        inset 0 0 40px rgba(255,255,255,0.2);
      transition: background 0.4s ease, box-shadow 0.4s ease, transform 0.2s ease;
      animation: idle 4s ease-in-out infinite;
    }
    .orb-wrapper.listening .orb {
      background: radial-gradient(circle at 30% 30%, var(--orb-listening), #082f49 70%);
      box-shadow: 0 0 80px 15px var(--orb-listening), inset 0 0 40px rgba(255,255,255,0.3);
      animation: listening 1.4s ease-in-out infinite;
    }
    .orb-wrapper.speaking .orb {
      background: radial-gradient(circle at 30% 30%, var(--orb-speaking), #500724 70%);
      box-shadow: 0 0 100px 20px var(--orb-speaking), inset 0 0 40px rgba(255,255,255,0.4);
      animation: speaking 0.6s ease-in-out infinite;
    }
    .orb-wrapper.connecting .orb {
      animation: connecting 1s linear infinite;
    }
    .orb-wrapper:hover .orb { transform: scale(1.05); }
    .orb-wrapper:active .orb { transform: scale(0.96); }
    @keyframes idle {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes listening {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes speaking {
      0%,100% { transform: scale(1.02); }
      25% { transform: scale(1.12); }
      50% { transform: scale(1.05); }
      75% { transform: scale(1.15); }
    }
    @keyframes connecting {
      0% { transform: rotate(0) scale(1); opacity: 0.7; }
      50% { transform: rotate(180deg) scale(1.05); opacity: 1; }
      100% { transform: rotate(360deg) scale(1); opacity: 0.7; }
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .status {
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.7;
      min-height: 1.2em;
    }
    .hint { font-size: 0.85rem; opacity: 0.4; }
    .error { color: #f87171; font-size: 0.85rem; max-width: 300px; text-align: center; }
  </style>
</head>
<body>
  <h1 style="font-weight:300; letter-spacing:0.05em;">Voice Agent</h1>
  <div id="orbWrapper" class="orb-wrapper" role="button" aria-label="Start voice conversation">
    <div class="ring"></div>
    <div class="orb"></div>
  </div>
  <div id="status" class="status">Tap to start</div>
  <div class="hint">Click the orb to talk · Click again to stop</div>
  <div id="error" class="error"></div>

  <script type="module">
    import { Conversation } from "https://esm.sh/@elevenlabs/client";

    // 🔧 Replace by your public agent ID from ElevenLabs UI
    const AGENT_ID = "agent_4501kqssdf63e1qsqw3j0rx7b25f";

    const orbWrapper = document.getElementById("orbWrapper");
    const statusEl   = document.getElementById("status");
    const errorEl    = document.getElementById("error");

    let conversation = null;
    let connecting   = false;

    function setState(state) {
      orbWrapper.classList.remove("listening", "speaking", "connecting");
      if (state) orbWrapper.classList.add(state);
    }
    function setStatus(text)  { statusEl.textContent = text; }
    function setError(text)   { errorEl.textContent  = text || ""; }

    async function startConversation() {
      if (conversation || connecting) return;
      connecting = true;
      setError("");
      setState("connecting");
      setStatus("Connecting…");

      try {
        // 1. Ask microphone permission first (must be in a user gesture)
        await navigator.mediaDevices.getUserMedia({ audio: true });

        // 2. Start the ElevenLabs session (WebRTC by default for voice)
        conversation = await Conversation.startSession({
          agentId: AGENT_ID,
          connectionType: "webrtc",
          onConnect: ({ conversationId }) => {
            console.log("Connected:", conversationId);
            setStatus("Listening…");
            setState("listening");
          },
          onDisconnect: () => {
            console.log("Disconnected");
            setStatus("Tap to start");
            setState(null);
            conversation = null;
          },
          onModeChange: ({ mode }) => {
            // mode is "speaking" or "listening"
            console.log("Mode:", mode);
            setState(mode === "speaking" ? "speaking" : "listening");
            setStatus(mode === "speaking" ? "Agent speaking…" : "Listening…");
          },
          onMessage: ({ message, source }) => {
            console.log(`[${source}]`, message);
          },
          onStatusChange: ({ status }) => {
            console.log("Status:", status);
          },
          onError: (msg, ctx) => {
            console.error("Error:", msg, ctx);
            setError(typeof msg === "string" ? msg : "An error occurred");
          },
        });
      } catch (err) {
        console.error("Failed to start:", err);
        setError(
          err?.name === "NotAllowedError"
            ? "Microphone permission denied."
            : (err?.message || "Failed to start session")
        );
        setStatus("Tap to retry");
        setState(null);
        conversation = null;
      } finally {
        connecting = false;
      }
    }

    async function stopConversation() {
      if (!conversation) return;
      setStatus("Disconnecting…");
      try {
        await conversation.endSession();
      } catch (e) {
        console.error(e);
      }
      conversation = null;
      setState(null);
      setStatus("Tap to start");
    }

    orbWrapper.addEventListener("click", () => {
      if (conversation) stopConversation();
      else              startConversation();
    });

    // Optional: animate orb scale based on agent output volume (works only in WebSocket mode reliably;
    // in WebRTC the volumes are still readable). Uncomment to enable:
    /
    function loop() {
      if (conversation) {
        const out = conversation.getOutputVolume?.() ?? 0;
        const inp = conversation.getInputVolume?.()  ?? 0;
        const v = Math.max(out, inp);
        const orb = orbWrapper.querySelector(".orb");
        orb.style.transform = `scale(${1 + v * 0.4})`;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    /
  </script>
</body>
</html>
